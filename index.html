<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Registration Form</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="background">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
</div>

<div class="container">

    <form id="registrationForm">

        <h1>Create Account</h1>
        <p>Fill your information below</p>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Image Upload -->

        <div class="profile-upload">

            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                 id="previewImage">

            <label for="profilePic" class="upload-btn">
                Upload Photo
            </label>

            <input
            type="file"
            id="profilePic"
            accept="image/*"
            hidden>

        </div>

        <!-- First Name -->

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="firstName" required>
            <label>First Name</label>
            <small></small>
        </div>

        <!-- Last Name -->

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="lastName" required>
            <label>Last Name</label>
            <small></small>
        </div>

        <!-- Email -->

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" required>
            <label>Email Address</label>
            <small></small>
        </div>

        <!-- Phone -->

        <div class="input-box">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="phone" maxlength="10" required>
            <label>Phone Number</label>
            <small></small>
        </div>

        <!-- DOB -->

        <div class="input-box">
            <i class="fa-solid fa-calendar"></i>
            <input type="date" id="dob" required>
        </div>

        <!-- Gender -->

        <div class="select-box">

            <i class="fa-solid fa-venus-mars"></i>

            <select id="gender">

                <option value="">Select Gender</option>

                <option>Male</option>

                <option>Female</option>

                <option>Other</option>

            </select>

        </div>

        <!-- Country -->

        <div class="select-box">

            <i class="fa-solid fa-earth-asia"></i>

            <select id="country">

                <option value="">Select Country</option>

                <option>India</option>

                <option>USA</option>

                <option>Canada</option>

                <option>Australia</option>

                <option>United Kingdom</option>

                <option>Germany</option>

                <option>Japan</option>

            </select>

        </div>

        <!-- Address -->

        <div class="textarea-box">

            <textarea
            id="address"
            rows="3"
            required></textarea>

            <label>Address</label>

        </div>

        <!-- Occupation -->

        <div class="input-box">

            <i class="fa-solid fa-briefcase"></i>

            <input
            type="text"
            id="occupation"
            required>

            <label>Occupation</label>

        </div>

        <!-- Skills -->

        <div class="checkbox-section">

            <h3>Skills</h3>

            <label>
                <input type="checkbox"> HTML
            </label>

            <label>
                <input type="checkbox"> CSS
            </label>

            <label>
                <input type="checkbox"> JavaScript
            </label>

            <label>
                <input type="checkbox"> React
            </label>

            <label>
                <input type="checkbox"> Node.js
            </label>

        </div>

        <!-- Password -->

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
            type="password"
            id="password"
            required>

            <label>Password</label>

            <span class="togglePassword">

                <i class="fa-solid fa-eye"></i>

            </span>

        </div>

        <!-- Strength -->

        <div class="strength">

            <div class="strength-bar">

                <div
                id="strengthFill">
                </div>

            </div>

            <span id="strengthText">
                Password Strength
            </span>

        </div>

        <!-- Confirm -->

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
            type="password"
            id="confirmPassword"
            required>

            <label>Confirm Password</label>

        </div>

        <!-- Terms -->

        <div class="terms">

            <label>

                <input
                type="checkbox"
                id="terms"
                required>

                I agree to the Terms &
                Conditions

            </label>

        </div>

        <!-- Button -->

        <button
        type="submit"
        id="submitBtn">

            <span>Create Account</span>

        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
